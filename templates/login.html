{% extends "base.html" %}
{% block title %}Log In — BusBook{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo"><i class="fas fa-bus"></i> BusBook</div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to manage your bookings</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div class="input-eye">
          <input type="password" name="password" id="pw" placeholder="Your password" required/>
          <i class="fas fa-eye toggle-eye" onclick="togglePw('pw',this)"></i>
        </div>
      </div>
      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" name="remember"/> Remember me
        </label>
      </div>
      <button type="submit" class="btn-auth">Log In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Sign up free</a></p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePw(id, icon) {
  const input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye','fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash','fa-eye');
  }
}
</script>
{% endblock %}
