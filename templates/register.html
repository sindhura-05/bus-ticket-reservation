{% extends "base.html" %}
{% block title %}Create Account — BusBook{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo"><i class="fas fa-bus"></i> BusBook</div>
    <h2>Create your account</h2>
    <p class="auth-sub">Join thousands of travellers booking smarter</p>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input type="text" name="full_name" placeholder="Sindhura K" required/>
      </div>
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label><i class="fas fa-phone"></i> Mobile Number</label>
        <input type="tel" name="phone" placeholder="+91 98765 43210" required/>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div class="input-eye">
          <input type="password" name="password" id="pw1" placeholder="Min. 6 characters" required/>
          <i class="fas fa-eye toggle-eye" onclick="togglePw('pw1',this)"></i>
        </div>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Confirm Password</label>
        <div class="input-eye">
          <input type="password" name="confirm_password" id="pw2" placeholder="Repeat password" required/>
          <i class="fas fa-eye toggle-eye" onclick="togglePw('pw2',this)"></i>
        </div>
      </div>
      <button type="submit" class="btn-auth">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePw(id, icon) {
  const input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye','fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash','fa-eye');
  }
}
</script>
{% endblock %}
